<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="geo_silent">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>geo_silent</title>
  <link rel="manifest" href="manifest.json">
  <script>
    // Dynamically load Google Maps API from the .env file for Web
    fetch('assets/.env')
      .then(response => response.text())
      .then(text => {
        const match = text.match(/GOOGLE_MAP_API_KEY=(.*)/);
        if (match && match[1]) {
          const script = document.createElement('script');
          script.src = `https://maps.googleapis.com/maps/api/js?key=${match[1].trim()}`;
          script.onload = loadFlutter;
          document.head.append(script);
        } else {
          loadFlutter();
        }
      })
      .catch(e => {
        console.error('Failed to load .env for Maps API', e);
        loadFlutter();
      });

    function loadFlutter() {
      const flutterScript = document.createElement('script');
      flutterScript.src = "flutter_bootstrap.js";
      flutterScript.async = true;
      document.body.append(flutterScript);
    }
  </script>
</head>
<body>
</body>
</html>
