name: geo_silent
description: Geo Surveillance-Based Acoustic Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  
  # State Management
  provider: ^6.1.1
  
  # Location & Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  
  # Storage
  shared_preferences: ^2.2.2
  uuid: ^4.0.0
  
  # UI Packages
  lottie: ^2.7.0
  animated_text_kit: ^4.2.2
  flutter_svg: ^2.0.9
  curved_navigation_bar: ^1.0.3
  shimmer: ^3.0.0
  
  # Utilities
  intl: ^0.18.1
  connectivity_plus: ^5.0.0
  cupertino_icons: ^1.0.8
  
  # Remove problematic packages for now
  permission_handler: ^12.0.1 # Temporarily removed due to v1 embedding issues
  # flutter_local_notifications: ^15.0.0
  # workmanager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: "^0.13.1"

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/appicon-rebg.png"
  adaptive_icon_background: "#FFFFFF"
  

flutter:
  uses-material-design: true
  assets:
    - assets/images/appicon-rebg.png
    - assets/animation/login.json
    - assets/animation/signup.json
    - assets/animation/sound_waves.json
    - assets/animation/wave_loop.json

    
  # Google Maps API key setup for Android
  # Add this to android/app/src/main/AndroidManifest.xml:
  # <meta-data
  #   android:name="com.google.android.geo.API_KEY"
  #   android:value="YOUR_API_KEY"/>